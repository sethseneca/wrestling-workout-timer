<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Wrestling Timer">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="application-name" content="Wrestling Timer">
    <title>Wrestling Workout Timer</title>
    <link rel="manifest" href="manifest.webmanifest?v=20260630-console7">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/icons/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css?v=20260630-console7">
  </head>
  <body>
    <main class="app" id="app">
      <section class="timer-panel" aria-labelledby="phaseLabel">
        <div class="brand-row">
          <p class="kicker">Wrestling Workout Timer</p>
          <span class="status-pill" id="runStatus">Ready</span>
        </div>

        <div class="timer-display">
          <p class="phase-label" id="phaseLabel">GET READY</p>
          <p class="countdown" id="countdown" aria-live="polite">00:10</p>
          <p class="round-counter" id="roundCounter">Round 1 of 8</p>
        </div>

        <div class="control-console" aria-label="Timer controls">
          <div class="console-orbit" aria-hidden="true"></div>
          <button class="arc-button arc-reset" id="resetButton" type="button" aria-label="Reset timer">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v6h6" />
            </svg>
          </button>

          <button class="arc-button arc-back" id="skipBackButton" type="button" aria-label="Previous interval">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m11 18-6-6 6-6" />
              <path d="m19 18-6-6 6-6" />
            </svg>
          </button>

          <button class="play-button" id="startButton" type="button" aria-label="Start timer">
            <svg class="play-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="pause-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 5v14" />
              <path d="M16 5v14" />
            </svg>
            <span class="sr-only" id="playButtonLabel">Start</span>
          </button>

          <button class="arc-button arc-forward" id="skipButton" type="button" aria-label="Next interval">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m13 6 6 6-6 6" />
              <path d="m5 6 6 6-6 6" />
            </svg>
          </button>

          <div class="manual-cues arc-button arc-whistle" id="manualCues" aria-label="Manual cue controls">
            <button data-manual-cue="whistle" type="button" aria-label="Whistle">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5 15.5c0 2.5 2 4.5 4.5 4.5h5.25a4.75 4.75 0 0 0 0-9.5H11" />
                <path d="M4 10.5h7v5H4z" />
                <path d="M11 10.5V7a3 3 0 0 1 3-3h5" />
                <path d="M19 4v4" />
                <path d="M8.25 15.5h.01" />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="settings-panel" aria-labelledby="settingsTitle">
        <h1 id="settingsTitle">Workout Setup</h1>

        <form id="settingsForm">
          <fieldset class="duration-field">
            <legend>Work Duration</legend>
            <div class="time-inputs">
              <label>
                <span>Min</span>
                <input id="workMinutes" inputmode="numeric" min="0" max="59" type="number" value="0">
              </label>
              <label>
                <span>Sec</span>
                <input id="workSeconds" inputmode="numeric" min="0" max="59" step="5" type="number" value="30">
              </label>
            </div>
          </fieldset>

          <fieldset class="duration-field">
            <legend>Rest Duration</legend>
            <div class="time-inputs">
              <label>
                <span>Min</span>
                <input id="restMinutes" inputmode="numeric" min="0" max="59" type="number" value="0">
              </label>
              <label>
                <span>Sec</span>
                <input id="restSeconds" inputmode="numeric" min="0" max="59" step="5" type="number" value="15">
              </label>
            </div>
          </fieldset>

          <fieldset class="duration-field">
            <legend>Get Ready</legend>
            <div class="time-inputs">
              <label>
                <span>Min</span>
                <input id="readyMinutes" inputmode="numeric" min="0" max="59" type="number" value="0">
              </label>
              <label>
                <span>Sec</span>
                <input id="readySeconds" inputmode="numeric" min="0" max="59" step="5" type="number" value="10">
              </label>
            </div>
          </fieldset>

          <label class="round-field">
            <span>Rounds</span>
            <input id="rounds" inputmode="numeric" min="1" max="99" type="number" value="8">
          </label>

          <section class="timer-library" aria-labelledby="savedTimersTitle">
            <h2 id="savedTimersTitle">Saved Timers</h2>
            <div class="save-timer-row">
              <label class="timer-name-field">
                <span>Name</span>
                <input id="timerName" maxlength="40" placeholder="Match Day Conditioning" type="text">
              </label>
              <button id="saveTimerButton" type="button">Save</button>
            </div>
            <div class="saved-timer-list" id="savedTimerList" aria-live="polite"></div>
          </section>

          <section class="sound-check" aria-labelledby="soundCheckTitle">
            <h2 id="soundCheckTitle">Sound Check</h2>
            <div class="sound-check-grid" id="soundCheck">
              <button data-sound-check="countdown" type="button">Ready Set</button>
              <button data-sound-check="whistle" type="button">Whistle</button>
              <button data-sound-check="tenSecondPop" type="button">10 Sec</button>
            </div>
          </section>
        </form>
      </section>
    </main>

    <script src="app.js?v=20260630-console7" defer></script>
  </body>
</html>
